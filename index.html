<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador EBD Fiel - Blindado</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1726;
  color: #fff;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #122033;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
  border: 1px solid rgba(255,255,255,0.08);
}

h1 {
  margin-bottom: 10px;
}

label {
  font-weight: bold;
  display: block;
  margin-top: 10px;
  margin-bottom: 5px;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #1b2c44;
  color: #fff;
  font-size: 14px;
}

textarea {
  min-height: 200px;
  resize: vertical;
}

#resultado {
  min-height: 600px;
  white-space: pre-wrap;
  line-height: 1.6;
}

.buttons {
  margin-top: 15px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

button {
  padding: 12px 18px;
  border: none;
  border-radius: 999px;
  font-weight: bold;
  cursor: pointer;
}

.btn-gerar {
  background: #f7b24d;
  color: #000;
}

.btn-limpar {
  background: #2a3d5a;
  color: #fff;
}

.btn-copiar {
  background: #22c55e;
  color: #fff;
}

.status {
  margin-top: 10px;
  font-size: 14px;
  min-height: 20px;
}

.status.ok { color: #22c55e; }
.status.erro { color: #ef4444; }

.loading {
  opacity: 0.6;
  pointer-events: none;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h1>Gerador de Lições EBD Fiel</h1>
    <p>Estrutura fixa com IA (modo blindado)</p>
  </div>

  <div class="card" id="formArea">

    <label>Público</label>
    <select id="publico">
      <option value="adultos">Adultos</option>
      <option value="jovens">Jovens</option>
    </select>

    <label>Título da lição</label>
    <input id="titulo" placeholder="Ex: Lição 1: O chamado que transforma dor em propósito">

    <label>Texto original da revista</label>
    <textarea id="texto"></textarea>

    <div class="buttons">
      <button class="btn-gerar" onclick="gerar()">Gerar lição</button>
      <button class="btn-limpar" onclick="limpar()">Limpar</button>
      <button class="btn-copiar" onclick="copiar()">Copiar</button>
    </div>

    <div id="status" class="status"></div>

  </div>

  <div class="card">
    <label>Resultado final</label>
    <textarea id="resultado"></textarea>
  </div>

</div>

<script>
const API_URL = "https://gerador-licoes-adulto.onrender.com/api/gerar-licao-completa";

async function gerar() {
  const titulo = document.getElementById("titulo").value.trim();
  const texto = document.getElementById("texto").value.trim();
  const publico = document.getElementById("publico").value;
  const status = document.getElementById("status");
  const resultado = document.getElementById("resultado");
  const form = document.getElementById("formArea");

  if (!titulo || !texto) {
    status.innerText = "Preencha título e texto.";
    status.className = "status erro";
    return;
  }

  form.classList.add("loading");
  status.innerText = "Gerando...";
  status.className = "status";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        titulo,
        textoOriginal: texto,
        publico
      })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || "Erro na geração");
    }

    resultado.value = data.licaoCompleta || "";
    status.innerText = "Lição gerada com sucesso!";
    status.className = "status ok";

  } catch (err) {
    status.innerText = "Erro: " + err.message;
    status.className = "status erro";
  }

  form.classList.remove("loading");
}

function limpar() {
  document.getElementById("titulo").value = "";
  document.getElementById("texto").value = "";
  document.getElementById("resultado").value = "";
  document.getElementById("status").innerText = "";
}

async function copiar() {
  const texto = document.getElementById("resultado").value;
  const status = document.getElementById("status");

  if (!texto.trim()) {
    status.innerText = "Nada para copiar.";
    status.className = "status erro";
    return;
  }

  try {
    await navigator.clipboard.writeText(texto);
    status.innerText = "Copiado!";
    status.className = "status ok";
  } catch {
    status.innerText = "Erro ao copiar.";
    status.className = "status erro";
  }
}
</script>

</body>
</html>
