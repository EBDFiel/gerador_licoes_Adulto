<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador EBD Fiel</title>

<style>
body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: #0f172a;
    color: #fff;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 1500px;
    margin: auto;
}

.top {
    margin-bottom: 20px;
}

h1 {
    margin: 0;
    color: #f7b24d;
}

.layout {
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 20px;
}

.panel {
    background: #16233d;
    padding: 20px;
    border-radius: 16px;
}

label {
    display: block;
    margin-bottom: 6px;
    font-weight: bold;
    color: #ffe0ae;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin-bottom: 12px;
}

textarea {
    min-height: 300px;
}

button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.primary { background: #f7b24d; color: #000; }
.secondary { background: #2a3a5f; color: #fff; }

.preview {
    background: #e5e7eb;
    padding: 20px;
    border-radius: 16px;
}

.doc {
    background: white;
    color: black;
    padding: 30px;
    max-width: 1280px;
    margin: auto;
    border-radius: 10px;
}

.status {
    margin-top: 10px;
}

</style>
</head>

<body>

<div class="container">

<div class="top">
    <h1>Gerador EBD Fiel</h1>
    <p>Geração automática no modelo correto de Adultos e Jovens</p>
</div>

<div class="layout">

<!-- ESQUERDA -->
<div class="panel">

<label>Público</label>
<select id="publico">
<option value="adultos">Adultos</option>
<option value="jovens">Jovens</option>
</select>

<label>Título</label>
<input id="titulo">

<label>Texto da Revista</label>
<textarea id="texto"></textarea>

<button class="primary" onclick="gerar()">Gerar Lição</button>
<button class="secondary" onclick="limpar()">Limpar</button>

<div class="status" id="status"></div>

</div>

<!-- DIREITA -->
<div class="preview">
<div id="resultado" class="doc">
<p style="text-align:center;color:#888;">Nenhuma lição gerada</p>
</div>
</div>

</div>

</div>

<script>

let ultimoHTML = "";

function esc(t=""){
    return t.replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function gerar(){

    const titulo = document.getElementById("titulo").value;
    const texto = document.getElementById("texto").value;
    const publico = document.getElementById("publico").value;

    if(!titulo || !texto){
        status("Preencha os campos", true);
        return;
    }

    status("Gerando...", false);

    fetch("/api/gerar-licao-completa",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({titulo, textoOriginal:texto, publico})
    })
    .then(r=>r.json())
    .then(data=>{

        const html = gerarHTML(data, publico);

        document.getElementById("resultado").innerHTML = html;
        ultimoHTML = html;

        status("Gerado com sucesso", false);
    })
    .catch(e=>{
        status("Erro ao gerar", true);
    });
}

function status(msg, erro){
    const el = document.getElementById("status");
    el.innerText = msg;
    el.style.color = erro ? "#ff6b6b" : "#4ade80";
}

function limpar(){
    document.getElementById("titulo").value="";
    document.getElementById("texto").value="";
    document.getElementById("resultado").innerHTML="<p style='text-align:center;color:#888;'>Nenhuma lição gerada</p>";
}

function gerarHTML(dados, publico){

return `
<div style="max-width:1280px;margin:auto">

<h2 style="text-align:center">Lição ${dados.numero||""}: ${esc(dados.titulo||"")}</h2>

<p><b>${publico==="jovens"?"VERSÍCULO DO DIA":"TEXTO ÁUREO"}:</b> ${esc(dados.textoAureoOuVersiculo||"")}</p>

<p><b>VERDADE APLICADA:</b> ${esc(dados.verdadeAplicada||"")}</p>

<p><b>TEXTOS DE REFERÊNCIA:</b> ${esc(dados.textosReferencia||"")}</p>

<p><b>INTRODUÇÃO:</b> ${esc(dados.introducao?.conteudo||"")}</p>

<p><b>CONCLUSÃO:</b> ${esc(dados.conclusao?.conteudo||"")}</p>

</div>
`;
}

</script>

</body>
</html>
