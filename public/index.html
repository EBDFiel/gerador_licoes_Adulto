<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gerador EBD Fiel</title>
    <style>
        body {
            background: #0a1626;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 { color: #f7b24d; }
        textarea, input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            background: #1e2a3a;
            color: #fff;
            border: 1px solid #3a4a5a;
        }
        button {
            background: #f7b24d;
            color: #0a1626;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .resultado {
            background: #0f1b2e;
            padding: 20px;
            border-radius: 8px;
            white-space: pre-wrap;
            font-family: monospace;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>✨ Gerador de Lições EBD</h1>
    
    <label>Público:</label>
    <select id="publico">
        <option value="adultos">Adultos</option>
        <option value="jovens">Jovens</option>
    </select>
    
    <label>Título:</label>
    <input id="titulo" placeholder="Ex: Lição 1: O chamado que transforma a dor em propósito">
    
    <label>Texto da Revista:</label>
    <textarea id="texto" rows="10" placeholder="Cole aqui o texto completo da revista..."></textarea>
    
    <button onclick="gerar()">Gerar Lição</button>
    <button onclick="limpar()">Limpar</button>
    <button onclick="copiar()">Copiar</button>
    
    <div id="status"></div>
    <div id="resultado" class="resultado"></div>

    <script>
        async function gerar() {
            const titulo = document.getElementById('titulo').value;
            const texto = document.getElementById('texto').value;
            const publico = document.getElementById('publico').value;
            const status = document.getElementById('status');
            const resultado = document.getElementById('resultado');
            
            if (!titulo || !texto) {
                status.innerHTML = '❌ Preencha título e texto';
                return;
            }
            
            status.innerHTML = '⏳ Gerando... aguarde';
            resultado.innerHTML = 'Processando...';
            
            try {
                const res = await fetch('/api/gerar-licao-completa', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ titulo, textoOriginal: texto, publico })
                });
                const data = await res.json();
                
                if (!res.ok) throw new Error(data.error);
                
                resultado.innerText = data.licaoCompleta;
                status.innerHTML = '✅ Lição gerada!';
            } catch (err) {
                status.innerHTML = '❌ Erro: ' + err.message;
                resultado.innerHTML = 'Erro ao gerar';
            }
        }
        
        function limpar() {
            document.getElementById('titulo').value = '';
            document.getElementById('texto').value = '';
            document.getElementById('resultado').innerHTML = '';
            document.getElementById('status').innerHTML = '';
        }
        
        async function copiar() {
            const texto = document.getElementById('resultado').innerText;
            if (texto) {
                await navigator.clipboard.writeText(texto);
                alert('Copiado!');
            }
        }
    </script>
</body>
</html>
